name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore AspNetCoreDashboard.slnx

      - name: Verify formatting
        run: dotnet format AspNetCoreDashboard.slnx --verify-no-changes

      - name: Build
        run: dotnet build AspNetCoreDashboard.slnx -c Release --no-restore

      - name: Test
        run: dotnet test AspNetCoreDashboard.slnx -c Release --no-build --verbosity normal

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Test ASP.NET Core on Linux (net8.0)
        run: dotnet test Tests/AspNetCoreDashboard.Tests/AspNetCoreDashboard.Tests.csproj -c Release -f net8.0 --verbosity normal
